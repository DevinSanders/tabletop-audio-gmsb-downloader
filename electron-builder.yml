appId: com.gamemastersoundboard.tta-downloader
productName: TTA GMSB Downloader
copyright: Copyright © 2026 Devin Sanders

directories:
  output: dist
  buildResources: build

files:
  - out/**
  - package.json

asar: true

# Publish to GitHub Releases (created as a draft for review before going live).
publish:
  provider: github
  owner: DevinSanders
  repo: tabletop-audio-gmsb-downloader
  releaseType: draft

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.music
  artifactName: ${productName}-${version}-${arch}.${ext}
  # No paid Apple Developer cert: build unsigned (see README for how to open).
  identity: null

linux:
  target:
    - AppImage
    - deb
  category: AudioVideo
  maintainer: Devin Sanders <devin@asdconsulting.solutions>
  artifactName: ${productName}-${version}-${arch}.${ext}
