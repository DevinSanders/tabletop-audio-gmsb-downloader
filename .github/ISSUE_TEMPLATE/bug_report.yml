name: Bug report
description: Report something that isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! **Please do not paste the contents of any
        `patreon-debug-*.json` file** — they contain your account data and signed
        download URLs. A short description of what the file showed is fine.
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. v0.1.0 (see the GitHub Release you installed)
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Screenshots, error messages, or DevTools console output (View → Toggle Developer Tools).
